collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel
    cmd_vel_out_topic: /cmd_vel_safe
    transform_tolerance: 0.1
    source_timeout: 0.3
    base_shift_correction: True
    stop_pub_timeout: 1.0

    # 当前 16 边形 footprint 是以 x=-0.09025m 为圆心、半径 0.27675m
    # 的偏心圆近似；以下两区分别向外扩 0.10m 和 0.30m，需现场低速校准。
    polygons: ["stop_zone", "slowdown_zone"]
    stop_zone:
      type: polygon
      points: [0.28650, 0.00000, 0.25782, 0.14418, 0.17615, 0.26640, 0.05393, 0.34807, -0.09025, 0.37675, -0.23443, 0.34807, -0.35665, 0.26640, -0.43832, 0.14418, -0.46700, 0.00000, -0.43832, -0.14418, -0.35665, -0.26640, -0.23443, -0.34807, -0.09025, -0.37675, 0.05393, -0.34807, 0.17615, -0.26640, 0.25782, -0.14418]
      action_type: stop
      max_points: 2
      visualize: True
      polygon_pub_topic: /collision_monitor/stop_zone
      enabled: True
    slowdown_zone:
      type: polygon
      points: [0.48650, 0.00000, 0.44260, 0.22071, 0.31757, 0.40782, 0.13046, 0.53285, -0.09025, 0.57675, -0.31096, 0.53285, -0.49807, 0.40782, -0.62310, 0.22071, -0.66700, 0.00000, -0.62310, -0.22071, -0.49807, -0.40782, -0.31096, -0.53285, -0.09025, -0.57675, 0.13046, -0.53285, 0.31757, -0.40782, 0.44260, -0.22071]
      action_type: slowdown
      max_points: 2
      slowdown_ratio: 0.35
      visualize: True
      polygon_pub_topic: /collision_monitor/slowdown_zone
      enabled: True

    observation_sources: ["scan"]
    scan:
      type: scan
      topic: /scan
      enabled: True
