voice_session_node:
  ros__parameters:
    agent_request_topic: /inspection_ai/agent_request
    agent_chat_topic: /inspection_ai/agent_chat
    voice_session_command_topic: /inspection_ai/voice_session_command
    voice_session_status_topic: /inspection_ai/voice_session_status
    say_text_topic: /inspection_ai/say_text
    voice_status_topic: /inspection_ai/voice_status
    start_voice_session_service_name: /inspection_ai/start_voice_session
    stop_voice_session_service_name: /inspection_ai/stop_voice_session
    audio_device: default
    audio_input_device: default
    audio_output_device: default
    voice_cue_enabled: true
    enabled: false
    auto_start_standby: true
    silent_start: true
    local_kws_enabled: true
    kws_encoder: ~/.local/share/ylhb/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/encoder-epoch-13-avg-2-chunk-8-left-64.int8.onnx
    kws_decoder: ~/.local/share/ylhb/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/decoder-epoch-13-avg-2-chunk-8-left-64.onnx
    kws_joiner: ~/.local/share/ylhb/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/joiner-epoch-13-avg-2-chunk-8-left-64.int8.onnx
    kws_tokens: ~/.local/share/ylhb/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/tokens.txt
    kws_keywords: ~/.local/share/ylhb/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20/keywords.txt
    kws_keywords_score: 1.3
    kws_keywords_threshold: 0.25
    agent_response_timeout_sec: 30.0
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    asr_model: qwen3-asr-flash
    request_timeout_sec: 15.0
    wake_phrase: 小零小零
    wake_aliases: [小林小林, 小玲小玲]
    wake_match_threshold: 0.55
    sample_rate: 16000
    frame_ms: 30
    energy_threshold: 800
    vad_silence_sec: 0.85
    min_voice_sec: 0.5
    max_utterance_sec: 8.0
    session_idle_timeout_sec: 35.0
    max_listen_wait_sec: 8.0
    voice_start_frames_required: 4
    asr_empty_silent_first: true
    asr_fail_prompt_threshold: 2
    asr_fail_standby_threshold: 3
    post_event_listen_pause_sec: 3.0
    ignore_empty_asr_after_event_sec: 6.0
    context_followup_timeout_sec: 12.0
    start_prompt_cooldown_sec: 8.0
    repeat_start_feedback: false
    pre_roll_sec: 0.4
    command_vad_silence_sec: 1.25
    command_min_voice_sec: 0.8
    wait_wake_threshold_multiplier: 1.8
    tts_tail_pause_sec: 0.9
    debug_save_asr_audio: false
    debug_audio_dir: /tmp/ylhb_voice_debug
    debug_audio_keep: 20
    debug_state_transitions: false

voice_output_node:
  ros__parameters:
    say_text_topic: /inspection_ai/say_text
    voice_status_topic: /inspection_ai/voice_status
