system_supervisor_node:
  ros__parameters:
    system_command_topic: /inspection_ai/system_command
    system_status_topic: /inspection_ai/system_status
    system_mode_topic: /inspection_ai/system_mode
    cmd_vel_topic: /cmd_vel
    workspace_dir: /home/nvidia/ros2_ws
    ros_distro: humble
    map_output_dir: /home/nvidia/ros2_ws/src/maps
    default_navigation_map: /home/nvidia/ros2_ws/maps/my_map.yaml
    perception_model_path: /home/nvidia/ros2_ws/src/ylhb_perception/models/yolo26.engine
    embedded_task_layer: true
    enable_voice: false
    enable_voice_session: false
    enable_capture_voice: false
    enable_tts: false
    audio_device: default
    audio_input_device: default
    audio_output_device: default
    asr_model: qwen3-asr-flash
    tts_model: qwen3-tts-flash
    tts_voice: Serena
    tts_language_type: Chinese
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

voice_input_node:
  ros__parameters:
    text_command_topic: /inspection_ai/text_command
    capture_voice_service_name: /inspection_ai/capture_voice
    audio_device: default
    audio_input_device: default
    record_sec: 4.0
    sample_rate: 16000
    enabled: false
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    asr_model: qwen3-asr-flash
    request_timeout_sec: 15.0

voice_session_node:
  ros__parameters:
    voice_command_event_topic: /inspection_ai/voice_command_event
    voice_session_status_topic: /inspection_ai/voice_session_status
    say_text_topic: /inspection_ai/say_text
    voice_status_topic: /inspection_ai/voice_status
    task_context_status_topic: /inspection_ai/task_context_status
    start_voice_session_service_name: /inspection_ai/start_voice_session
    stop_voice_session_service_name: /inspection_ai/stop_voice_session
    audio_device: default
    audio_input_device: default
    enabled: false
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    asr_model: qwen3-asr-flash
    request_timeout_sec: 15.0
    wake_phrase: 小零小零
    wake_aliases: [小零小零, 小玲小玲, 小灵小灵, 小林小林, 小零, 小玲]
    sample_rate: 16000
    frame_ms: 30
    energy_threshold: 800
    vad_silence_sec: 0.85
    min_voice_sec: 0.5
    max_utterance_sec: 6.0
    session_idle_timeout_sec: 35.0
    max_listen_wait_sec: 8.0
    voice_start_frames_required: 4
    asr_empty_silent_first: true
    asr_fail_prompt_threshold: 2
    asr_fail_standby_threshold: 3
    post_event_listen_pause_sec: 3.0
    ignore_empty_asr_after_event_sec: 6.0
    context_followup_timeout_sec: 8.0
    single_wake_default: true
    voice_close_words: [关闭语音模式, 退出语音模式, 停止语音模式, 关闭语音, 退出语音, 关掉语音, 结束语音, 关机]
    followup_words: [确认, 确定, 继续, 暂停, 取消, 停止, 人工接管, 恢复]

voice_command_router_node:
  ros__parameters:
    voice_command_event_topic: /inspection_ai/voice_command_event
    text_command_topic: /inspection_ai/text_command
    system_command_topic: /inspection_ai/system_command
    task_context_status_topic: /inspection_ai/task_context_status
    system_mode_topic: /inspection_ai/system_mode
    task_status_topic: /inspection_ai/task_status
    say_text_topic: /inspection_ai/say_text
    ignore_unknown_voice: true
    motion_aliases:
      - "向前进:前进"
      - "往前走:前进"
      - "往前:前进"
      - "向前:前进"
      - "前进:前进"
      - "倒车:后退"
      - "往后退:后退"
      - "往后:后退"
      - "向后:后退"
      - "后退:后退"
      - "左旋转:左转"
      - "向左转:左转"
      - "左转:左转"
      - "右旋转:右转"
      - "向右转:右转"
      - "右转:右转"
      - "停下来:停止"
      - "停下:停止"
      - "刹车:停止"
      - "停止:停止"
      - "停:停止"
    incomplete_motion_words: [旋转]
    system_commands:
      - "启动底盘|start_bringup|已发送启动底盘命令。"
      - "开始巡检|start_robot_stack|已发送启动巡检节点命令。"
      - "启动巡检|start_robot_stack|已发送启动巡检节点命令。"
      - "停止巡检|stop_robot_stack|已发送停止巡检节点命令。"
      - "紧急停止|emergency_stop|已发送紧急停止命令。"
      - "急停|emergency_stop|已发送紧急停止命令。"
      - "返回准备状态|return_ready|已发送返回准备状态命令。"
      - "返回准备|return_ready|已发送返回准备状态命令。"
    voice_close_words: [关闭语音模式, 退出语音模式, 停止语音模式, 关闭语音, 退出语音, 关掉语音, 结束语音, 关机]
    safety_words: [急停, 停下, 别动, 刹车, 停止]
    cancel_words: [取消任务, 取消当前任务, 取消巡检, 不要了]
    system_feedback_words: [怎么不说话, 你怎么不说话, 没声音, 听不到, 没有声音, 你没说话, 语音坏了]
    general_qa_words: [介绍一下自己, 介绍自己, 你是谁, 你能做什么, 你会做什么, 有什么功能, 能干什么, 怎么用, 使用方法, 语音怎么用]
    inspection_words: [开始巡检, 启动巡检, 执行巡检, 巡检任务, 暂停巡检, 恢复巡检, 继续巡检, 取消巡检, 人工接管, 检查点, 开始检查, 检测, 告警, 火源, 烟雾, 漏油, 安全帽, 开关, 刀闸]
    background_words: [调试, 报错, 日志, 代码, 网络, 麦克风]
    followup_words: [确认, 确定, 继续, 暂停, 取消, 停止, 人工接管, 恢复]

voice_output_node:
  ros__parameters:
    say_text_topic: /inspection_ai/say_text
    voice_status_topic: /inspection_ai/voice_status
    enabled: false
    tts_enabled: false
    audio_device: default
    audio_output_device: default
    dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    tts_model: qwen3-tts-flash
    tts_voice: Serena
    tts_language_type: Chinese
    request_timeout_sec: 10.0
    enable_tts_cache: true
    split_long_tts: true
    tts_segment_max_chars: 70
    preserve_long_task_tts_single_request: false
    interrupt_current_playback: true
