capabilities:
  search_robot_help:
    description: 查询本项目使用手册和运维文档；回答如何使用、如何连接、如何建图、如何巡逻等项目问题时使用
    risk_level: read_only
    executor: knowledge
    side_effect: none
    requires_confirmation: false
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema:
      properties:
        query: {type: string}
      required: [query]
  get_connection_info:
    description: 读取机器人当前网络接口、可用APP地址、Mobile Bridge、本地APP服务和云连接状态
    risk_level: read_only
    executor: connection
    side_effect: none
    requires_confirmation: false
    timeout_sec: 2.0
    result_schema: {status: [ok, failed]}
    argument_schema:
      properties:
        target: {type: string, enum: [all, local_app, cloud]}
      required: []
  run_self_check:
    description: 基于实时ROS、Supervisor、底盘、传感器、网络和进程状态执行只读自检
    risk_level: read_only
    executor: diagnostic
    side_effect: none
    requires_confirmation: false
    timeout_sec: 3.0
    result_schema: {status: [ok, warning, failed]}
    argument_schema:
      properties:
        scope: {type: string, enum: [all, connection, base, sensors, navigation, perception, patrol, voice]}
      required: []
  recover_component:
    description: 仅根据本轮新鲜诊断结果恢复配置白名单中的非运动组件；不得用于底盘、CAN、导航、电源和线路故障
    risk_level: system_control
    executor: system
    command: recover_component
    side_effect: component_recovery
    requires_confirmation: false
    preconditions: [no_active_patrol]
    refresh_summary_after: true
    requires_fresh_diagnostic: true
    timeout_sec: 30.0
    result_schema: {status: [sent, succeeded, failed, rejected, timeout]}
    argument_schema:
      properties:
        component: {type: string}
      required: [component]
  emergency_stop:
    description: 立即请求系统急停，不依赖模型后续判断
    risk_level: emergency
    executor: system
    command: emergency_stop
    topic_role: system_command
    side_effect: robot_stop
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [accepted, succeeded, failed]}
    argument_schema: {properties: {}, required: []}
  stop_motion:
    description: 停止受限相对运动
    risk_level: emergency
    executor: base_skill
    command: stop_motion
    topic_role: base_skill_command
    side_effect: robot_stop
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [accepted, succeeded, failed]}
    argument_schema: {properties: {}, required: []}
  start_component:
    description: 仅在目标运动工具返回 precondition_failed 且 recovery_components=[bringup] 后启动 bringup；不能独立启动，也不能启动 navigation 或 patrol_executor；组件就绪不代表目标动作成功
    model_visible: true
    risk_level: system_control
    executor: system
    side_effect: component_lifecycle
    requires_confirmation: false
    preconditions: []
    timeout_sec: 45.0
    result_schema: {status: [sent, succeeded, failed, timeout]}
    argument_schema:
      properties:
        component: {type: string, enum: [bringup]}
      required: [component]
  stop_component:
    description: 停止本轮 Agent 实际启动且已不再需要的通用组件
    model_visible: false
    risk_level: system_control
    executor: system
    side_effect: component_lifecycle
    requires_confirmation: false
    preconditions: [started_this_turn]
    timeout_sec: 20.0
    result_schema: {status: [sent, succeeded, failed, timeout]}
    argument_schema:
      properties:
        component: {type: string, enum: [bringup]}
      required: [component]
  end_voice_conversation:
    description: 仅当整句明确要求结束当前对话时调用；保留语音模式并进入等待唤醒；不得依据单个词或模糊 ASR 猜测
    risk_level: session_control
    executor: voice_session
    side_effect: voice_session_control
    suppress_speech_after_call: true
    requires_confirmation: false
    preconditions: []
    timeout_sec: 2.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  close_voice_mode:
    description: 仅当整句明确要求关闭整个语音模式时调用；关闭后需通过服务重新开启；语义不清时不得调用
    risk_level: session_control
    executor: voice_session
    side_effect: voice_session_control
    suppress_speech_after_call: true
    requires_confirmation: false
    preconditions: []
    timeout_sec: 2.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  rotate_relative:
    description: 在安全前提下相对旋转；angle_deg 正值表示左转/逆时针，负值表示右转/顺时针，允许范围含 -180° 与 +180°；“转回来/恢复刚才朝向”只能依据会话中上一条成功 rotate_relative 的真实 angle_deg 取反，无成功旋转证据时必须澄清，不能猜 180°
    risk_level: reversible_motion
    executor: base_skill
    command: rotate_relative
    topic_role: base_skill_command
    side_effect: robot_motion
    requires_confirmation: false
    preconditions: [robot_ready, chassis_online, sensor_fresh]
    timeout_sec: 20.0
    result_schema: {status: [accepted, running, succeeded, failed, canceled, timeout]}
    argument_schema:
      properties:
        angle_deg: {type: number, minimum: -180, maximum: 180}
      required: [angle_deg]
  move_relative:
    description: 在安全前提下小范围前后移动
    risk_level: reversible_motion
    executor: base_skill
    command: move_relative
    topic_role: base_skill_command
    side_effect: robot_motion
    requires_confirmation: false
    preconditions: [robot_ready, chassis_online, sensor_fresh]
    timeout_sec: 12.0
    result_schema: {status: [accepted, running, succeeded, failed, canceled, timeout]}
    argument_schema:
      properties:
        distance_m: {type: number, minimum: -0.5, maximum: 0.5}
      required: [distance_m]
  start_route:
    description: 启动一条已存在并通过安全校验的巡逻路线；Supervisor 内部负责 bringup、传感器、定位、Nav2 lifecycle、AMCL 初始位姿、map→odom 和 PatrolExecutor，不要预先启动 navigation 或 patrol_executor
    risk_level: mission
    executor: system
    command: start_patrol_mode
    fixed_arguments:
      profile: inspection
    topic_role: system_command
    side_effect: robot_navigation
    requires_confirmation: false
    preconditions: [no_active_patrol]
    timeout_sec: 14400.0
    result_schema: {status: [accepted, running, failed, timeout]}
    argument_schema: {properties: {}, required: [route_id]}
  start_patrol_mode:
    description: start_route 使用的内部 Supervisor 适配器
    model_visible: false
    risk_level: mission
    executor: system
    command: start_patrol_mode
    side_effect: robot_navigation
    requires_confirmation: false
    preconditions: []
    timeout_sec: 14400.0
    result_schema: {status: [accepted, running, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  go_to_checkpoint:
    description: 前往路线目录中已存在的检查点；Supervisor 内部完成完整巡逻栈准备并等待到达、失败或取消；“位置”一词本身不能触发本工具
    risk_level: reversible_motion
    executor: system
    command: go_to_checkpoint
    topic_role: system_command
    side_effect: robot_navigation
    requires_confirmation: false
    preconditions: [no_active_patrol]
    timeout_sec: 120.0
    result_schema: {status: [accepted, running, succeeded, failed, canceled, timeout]}
    argument_schema: {properties: {}, required: [target_id]}
  pause_patrol:
    description: 暂停正在运行的巡逻
    risk_level: reversible_motion
    executor: system
    command: pause_patrol
    topic_role: system_command
    side_effect: patrol_control
    requires_confirmation: false
    preconditions: [active_patrol]
    timeout_sec: 15.0
    result_schema: {status: [accepted, succeeded, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  resume_patrol:
    description: 恢复已暂停的巡逻
    risk_level: reversible_motion
    executor: system
    command: resume_patrol
    topic_role: system_command
    side_effect: patrol_control
    requires_confirmation: false
    preconditions: [paused_patrol, robot_ready]
    timeout_sec: 15.0
    result_schema: {status: [accepted, running, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  cancel_patrol:
    description: 取消正在运行或暂停的巡逻
    risk_level: emergency
    executor: system
    command: cancel_patrol
    topic_role: system_command
    side_effect: patrol_cancel
    requires_confirmation: false
    preconditions: []
    timeout_sec: 15.0
    result_schema: {status: [accepted, canceled, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  inspect_checkpoint:
    description: 查询检查点已配置的检测项目
    risk_level: read_only
    executor: route_read
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: [target_id]}
  list_routes:
    description: 列出路线目录中的路线
    risk_level: read_only
    executor: route_read
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  describe_route:
    description: 读取一条路线及其检查点
    risk_level: read_only
    executor: route_read
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: [route_id]}
  list_checkpoints:
    description: 列出路线中的检查点
    risk_level: read_only
    executor: route_read
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: [route_id]}
  get_system_status:
    description: 读取 Supervisor 系统状态
    risk_level: read_only
    executor: local
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  get_robot_summary:
    description: 读取聚合后的机器人模式、定位、导航、巡逻、传感器和底盘状态
    risk_level: read_only
    executor: local
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  get_patrol_status:
    description: 读取 PatrolExecutor 状态
    risk_level: read_only
    executor: local
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  get_3d_status:
    description: 查询三维采集、重建、上传和存储摘要的真实状态
    risk_level: read_only
    executor: local
    side_effect: none
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  list_3d_assets:
    description: 查询 Supervisor 已聚合的三维采集和重建资产摘要
    risk_level: read_only
    executor: local
    side_effect: none
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  start_3d_capture:
    description: 启动现场三维 SVO 采集；启动不表示采集完成
    risk_level: mission
    executor: system
    command: start_3d_mapping
    side_effect: mapping3d_capture
    preconditions: [no_active_patrol]
    timeout_sec: 30.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  stop_3d_capture:
    description: 停止现场三维采集并等待终态；可重复调用
    risk_level: mission
    executor: system
    command: stop_3d_mapping
    side_effect: mapping3d_capture
    preconditions: []
    timeout_sec: 15.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema: {properties: {}, required: []}
  reconstruct_3d_model:
    description: 使用已有采集会话启动离线三维重建；启动不表示模型已生成
    risk_level: mission
    executor: system
    command: reconstruct_3d_model
    side_effect: mapping3d_reconstruct
    preconditions: [no_active_patrol]
    timeout_sec: 30.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema:
      properties:
        session_id: {type: string}
        profile: {type: string, enum: [fast_check, quality_safe, quality_plus]}
      required: [profile]
  upload_3d_model:
    description: 将已有重建 session_id 提交到后台上传队列；入队不表示上传成功
    risk_level: mission
    executor: system
    command: enqueue_scene_upload
    side_effect: scene_upload
    preconditions: []
    timeout_sec: 15.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema:
      properties:
        session_id: {type: string}
      required: [session_id]
  retry_3d_upload:
    description: 重新提交已有三维上传 task_id
    risk_level: mission
    executor: system
    command: retry_scene_upload
    side_effect: scene_upload
    preconditions: []
    timeout_sec: 15.0
    result_schema: {status: [succeeded, failed, timeout]}
    argument_schema:
      properties:
        task_id: {type: string}
      required: [task_id]
  get_recent_inspection_results:
    description: 读取固定巡检历史目录中最近的摘要结果
    risk_level: read_only
    executor: local
    side_effect: none
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema:
      properties:
        limit: {type: integer, minimum: 1, maximum: 20}
      required: []
  get_voice_status:
    description: 读取语音会话状态
    risk_level: read_only
    executor: local
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok, failed]}
    argument_schema: {properties: {}, required: []}
  generate_local_status_reply:
    description: 仅用于普通问答、解释或澄清，不执行任何机器人动作；用户明确要求运动、巡逻或停止时不得选择本工具
    model_visible: true
    risk_level: read_only
    executor: local
    side_effect: none
    requires_confirmation: false
    preconditions: []
    timeout_sec: 1.0
    result_schema: {status: [ok]}
    argument_schema: {properties: {}, required: []}
